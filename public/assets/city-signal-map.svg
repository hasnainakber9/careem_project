<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" role="img" aria-labelledby="title desc">
  <title id="title">City mobility signal map visual</title>
  <desc id="desc">An open-source abstract city mobility map with routes, nodes, and demand bars.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#101714"/>
      <stop offset="1" stop-color="#050604"/>
    </linearGradient>
    <filter id="nodeGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="920" height="420" fill="url(#bg)"/>
  <g opacity="0.15" stroke="#f6f2e8">
    <path d="M0 70H920M0 140H920M0 210H920M0 280H920M0 350H920"/>
    <path d="M92 0V420M184 0V420M276 0V420M368 0V420M460 0V420M552 0V420M644 0V420M736 0V420M828 0V420"/>
  </g>
  <g fill="none" stroke-linecap="round">
    <path d="M52 338C156 262 231 290 326 222S470 92 594 126s169 120 268 72" stroke="#f6f2e8" stroke-opacity="0.2" stroke-width="10"/>
    <path d="M72 108C190 172 298 92 390 158s146 178 268 156 147-126 220-116" stroke="#7fb0ff" stroke-opacity="0.28" stroke-width="8"/>
    <path d="M112 312C230 260 282 238 382 248s175-28 250-88 150-70 218-38" stroke="#f6c562" stroke-opacity="0.62" stroke-width="6"/>
  </g>
  <g filter="url(#nodeGlow)">
    <circle cx="164" cy="286" r="14" fill="#f5f9ff"/><circle cx="164" cy="286" r="7" fill="#7fb0ff"/>
    <circle cx="360" cy="218" r="14" fill="#f5f9ff"/><circle cx="360" cy="218" r="7" fill="#7fb0ff"/>
    <circle cx="598" cy="130" r="14" fill="#f5f9ff"/><circle cx="598" cy="130" r="7" fill="#7fb0ff"/>
    <circle cx="748" cy="258" r="14" fill="#f5f9ff"/><circle cx="748" cy="258" r="7" fill="#7fb0ff"/>
  </g>
  <g fill="#f5f9ff" opacity="0.88" font-family="Manrope, Arial, sans-serif" font-weight="800">
    <text x="184" y="282" font-size="15">Airport</text>
    <text x="380" y="212" font-size="15">Core</text>
    <text x="618" y="126" font-size="15">Pickup</text>
    <text x="768" y="254" font-size="15">Dropoff</text>
  </g>
  <g transform="translate(70 48)" fill="#7fb0ff">
    <rect x="0" y="78" width="24" height="70" rx="4"/>
    <rect x="36" y="44" width="24" height="104" rx="4"/>
    <rect x="72" y="20" width="24" height="128" rx="4"/>
    <rect x="108" y="88" width="24" height="60" rx="4"/>
    <rect x="144" y="62" width="24" height="86" rx="4"/>
  </g>
  <g font-family="Manrope, Arial, sans-serif" font-weight="800">
    <text x="70" y="36" fill="#f5f9ff" font-size="20">REGIONAL SIGNAL VIEW</text>
    <text x="70" y="60" fill="#9ec4ff" font-size="13">Open-source local SVG asset</text>
  </g>
</svg>
